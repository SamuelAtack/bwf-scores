<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BWF Draw Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D; --dark-red: #b5001a;
  --bg: #111; --surface: #1c1c1c; --surface2: #242424; --surface3: #2e2e2e;
  --border: #2e2e2e; --text: #f0f0f0; --muted: #666; --live: #00e676;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--red);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 24px rgba(232,0,29,0.4);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-badge{background:white;color:var(--red);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;padding:2px 8px;letter-spacing:1px;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:white;letter-spacing:3px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.3);padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:white;}
.live-dot{width:6px;height:6px;background:var(--live);border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hbtn{background:rgba(0,0,0,0.3);border:none;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;padding:5px 12px;cursor:pointer;text-transform:uppercase;transition:background 0.15s;}
.hbtn:hover{background:rgba(0,0,0,0.5);}

/* TOURNAMENT BAR */
.tmt-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tmt-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;padding:6px 12px;cursor:pointer;outline:none;transition:border-color 0.15s;max-width:360px;width:100%;}
.tmt-select:focus{border-color:var(--red);}
.tmt-select option{background:var(--surface2);}
.tmt-badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;padding:3px 8px;text-transform:uppercase;}
.badge-s1000{background:rgba(232,0,29,0.2);color:var(--red);border:1px solid rgba(232,0,29,0.3);}
.badge-s750{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3);}
.badge-s500{background:rgba(100,180,255,0.1);color:#64b4ff;border:1px solid rgba(100,180,255,0.2);}
.badge-s300{background:rgba(150,150,150,0.1);color:#aaa;border:1px solid rgba(150,150,150,0.2);}
.tmt-meta{font-size:12px;color:var(--muted);}

/* MAIN TABS (Draw / French Players) */
.main-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg);}
.main-tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;}
.main-tab:hover{color:white;}
.main-tab.active{color:white;border-bottom-color:var(--red);}

/* DISCIPLINE TABS */
.disc-tabs{display:flex;gap:2px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;}
.disc-tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.disc-tab:hover{color:white;border-color:#555;}
.disc-tab.active{background:var(--red);border-color:var(--red);color:white;}

/* BRACKET */
.bracket-scroll{overflow-x:auto;padding:24px 20px 40px;}
.bracket-scroll::-webkit-scrollbar{height:4px;}
.bracket-scroll::-webkit-scrollbar-track{background:var(--surface);}
.bracket-scroll::-webkit-scrollbar-thumb{background:#444;}
.bracket{display:flex;gap:0;align-items:flex-start;width:max-content;}
.round-col{display:flex;flex-direction:column;}
.round-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 8px 10px;text-align:center;border-bottom:1px solid var(--border);width:100%;}
.round-hdr.r-live{color:var(--live);border-bottom-color:rgba(0,230,118,0.3);}
.round-body{display:flex;flex-direction:column;}

/* MATCH CARD */
.mc{background:var(--surface);border:1px solid var(--border);width:230px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;flex-shrink:0;}
.mc:hover{border-color:#555;box-shadow:0 2px 12px rgba(0,0,0,0.5);}
.mc.mc-live{border-color:rgba(0,230,118,0.35);}
.mc.mc-live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--live);}
.mc.mc-live:hover{border-color:var(--live);}
.mc.mc-final{border-color:rgba(232,0,29,0.25);}
.mc.mc-final:hover{border-color:var(--red);}
.mc.mc-empty{background:transparent;border-style:dashed;border-color:#252525;cursor:default;opacity:0.45;}
.mc.mc-empty:hover{border-color:#252525;box-shadow:none;}
.mc.mc-french{box-shadow:inset 0 0 0 1px rgba(0,85,164,0.5);}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;background:var(--surface2);border-bottom:1px solid var(--border);}
.mc-rnd{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.mc-st{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
.mc-st.st-live{color:var(--live);}
.mc-st.st-ft{color:#555;}
.mc-st.st-next{color:#3a3a3a;}
.tr{display:flex;align-items:center;gap:4px;padding:5px 8px;min-height:28px;}
.tr+.tr{border-top:1px solid var(--border);}
.tr.tr-won{background:rgba(255,255,255,0.04);}
.tr.tr-french{background:rgba(0,85,164,0.08);}
.tr-flag{width:16px;height:16px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#2a2a2a;}
.tr-seed{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;color:var(--red);width:16px;text-align:center;flex-shrink:0;}
.tr-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);min-width:0;margin-right:4px;}
.tr-name.n-won{color:white;font-weight:700;}
.tr-name.n-on{color:#ccc;}
.tr-name.n-tbd{color:#2e2e2e;font-style:italic;}
.tr-name.n-french{color:#5590e8;}
.tr-scores{display:flex;gap:2px;flex-shrink:0;}
.sc{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;min-width:18px;text-align:right;color:#3a3a3a;line-height:1;}
.sc.sc-w{color:#ddd;}
.sc.sc-live{color:var(--live);}
.vjoins{flex-shrink:0;overflow:visible;}

/* FRENCH PLAYERS PANEL */
.french-panel{padding:20px;}
.fp-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:white;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
.fr-flag-icon{width:20px;height:14px;object-fit:cover;border-radius:2px;}
.fp-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.fp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.fp-player{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.fp-player-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.fp-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--surface3);}
.fp-player-info{flex:1;}
.fp-player-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:white;}
.fp-player-disc{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:1px;}
.fp-status{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;}
.fp-status.fps-live{color:var(--live);background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);}
.fp-status.fps-in{color:#5590e8;background:rgba(85,144,232,0.1);border:1px solid rgba(85,144,232,0.2);}
.fp-status.fps-out{color:var(--muted);background:var(--surface3);border:1px solid var(--border);}
.fp-matches{padding:0;}
.fp-match{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);}
.fp-match:last-child{border-bottom:none;}
.fp-match-rnd{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;width:28px;flex-shrink:0;}
.fp-match-players{flex:1;}
.fp-match-vs{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fp-match-vs .me{color:white;font-weight:700;}
.fp-match-vs .opp{color:var(--muted);}
.fp-match-score{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--muted);text-align:right;white-space:nowrap;}
.fp-match-score.score-w{color:white;}
.fp-match-score.score-l{color:#444;}
.fp-match-score.score-live{color:var(--live);}
.fp-match-result{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;width:16px;flex-shrink:0;text-align:center;}
.fp-match-result.res-w{color:var(--live);}
.fp-match-result.res-l{color:var(--red);}
.fp-match-result.res-live{color:var(--live);}
.fp-empty{padding:40px 20px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;color:var(--muted);}

/* LOADING / ERROR */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ctext{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;max-width:460px;text-align:center;line-height:1.8;}

/* SCOREBOARD */
.scores-panel{padding:16px 20px 40px;}
.scores-section{margin-bottom:24px;}
.scores-section-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.scores-section-hdr .live-count{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:rgba(0,230,118,0.12);color:var(--live);border:1px solid rgba(0,230,118,0.25);padding:1px 7px;letter-spacing:1px;}
.score-row{display:flex;align-items:center;gap:0;background:var(--surface);border:1px solid var(--border);margin-bottom:4px;overflow:hidden;position:relative;cursor:pointer;transition:border-color 0.15s;}
.score-row:hover{border-color:#444;}
.score-row.sr-live{border-color:rgba(0,230,118,0.3);}
.score-row.sr-live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--live);}
.score-row.sr-french{box-shadow:inset 0 0 0 1px rgba(0,85,164,0.3);}
.sr-disc{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);padding:6px 5px;background:var(--surface2);border-right:1px solid var(--border);flex-shrink:0;min-height:52px;display:flex;align-items:center;justify-content:center;}
.sr-rnd{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 8px;width:36px;flex-shrink:0;text-align:center;}
.sr-teams{flex:1;padding:4px 6px;min-width:0;}
.sr-team{display:flex;align-items:center;gap:5px;padding:2px 0;min-height:22px;}
.sr-team+.sr-team{border-top:1px solid var(--border);}
.sr-flag{width:14px;height:14px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#2a2a2a;}
.sr-seed{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;color:var(--red);width:18px;flex-shrink:0;}
.sr-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);}
.sr-name.sn-won{color:white;font-weight:700;}
.sr-name.sn-french{color:#5590e8;}
.sr-scores{display:flex;gap:3px;padding:0 8px;flex-shrink:0;align-items:center;}
.sr-set{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;min-width:16px;text-align:right;color:#333;line-height:1;}
.sr-set.ss-w{color:#ddd;}
.sr-set.ss-live{color:var(--live);}
.sr-status{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:0 10px;flex-shrink:0;min-width:50px;text-align:center;}
.sr-status.sst-live{color:var(--live);}
.sr-status.sst-ft{color:#333;}
.sr-status.sst-next{color:#2a2a2a;}
.sr-court{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;color:#2e2e2e;padding:0 6px 0 0;flex-shrink:0;text-align:right;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-court.ct-live{color:#444;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">BWF</div>
    <div class="logo-text">DRAW VIEWER</div>
  </div>
  <div class="hdr-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <button class="hbtn" onclick="refreshCurrent()">↻ Refresh</button>
  </div>
</header>

<div class="tmt-bar">
  <select class="tmt-select" id="tmt-select" onchange="onTmtChange()"></select>
  <span id="tmt-level-badge" class="tmt-badge badge-s1000">Super 1000</span>
  <span id="tmt-location" class="tmt-meta"></span>
</div>

<div class="main-tabs">
  <button class="main-tab active" id="tab-draw" onclick="switchMainTab('draw')">Draw</button>
  <button class="main-tab" id="tab-scores" onclick="switchMainTab('scores')">Scoreboard</button>
  <button class="main-tab" id="tab-french" onclick="switchMainTab('french')">🇫🇷 French Players</button>
</div>

<div id="panel-draw">
  <div id="disc-tabs-bar" class="disc-tabs"></div>
  <div id="bracket-content"></div>
</div>

<div id="panel-scores" style="display:none">
  <div class="scores-panel">
    <div id="scores-content"></div>
  </div>
</div>

<div id="panel-french" style="display:none">
  <div class="french-panel">
    <div class="fp-title">French Players</div>
    <div class="fp-sub" id="fp-sub">Loading...</div>
    <div id="fp-grid" class="fp-grid"></div>
  </div>
</div>

// Pick the most relevant tournament: in-progress > most recently ended > next upcoming
function pickDefaultTournament() {
  const today = new Date().toISOString().slice(0,10);
  const keys  = Object.keys(TOURNAMENTS);

  // 1. Any tournament currently in progress?
  const live = keys.find(k => {
    const d = TOURNAMENTS[k].dates;
    return today >= d[0] && today <= d[d.length-1];
  });
  if (live) return live;

  // 2. Most recently completed
  const past = keys.filter(k => TOURNAMENTS[k].dates[TOURNAMENTS[k].dates.length-1] < today);
  if (past.length) return past.reduce((a,b) =>
    TOURNAMENTS[a].dates[TOURNAMENTS[a].dates.length-1] > TOURNAMENTS[b].dates[TOURNAMENTS[b].dates.length-1] ? a : b
  );

  // 3. Next upcoming
  const future = keys.filter(k => TOURNAMENTS[k].dates[0] > today);
  if (future.length) return future.reduce((a,b) =>
    TOURNAMENTS[a].dates[0] < TOURNAMENTS[b].dates[0] ? a : b
  );

  return keys[0];
}

// Build the tournament dropdown dynamically from TOURNAMENTS registry.
// Groups by badge level, marks unavailable ones, auto-formats dates.
function buildTmtDropdown() {
  const sel = document.getElementById('tmt-select');
  const today = new Date().toISOString().slice(0,10);

  // Group by level
  const groups = {'s1000':'Super 1000','s750':'Super 750','s500':'Super 500','s300':'Super 300'};
  const grouped = {'s1000':[],'s750':[],'s500':[],'s300':[]};
  Object.entries(TOURNAMENTS).forEach(([key, t]) => {
    if (grouped[t.badge]) grouped[t.badge].push([key, t]);
  });

  // Sort each group chronologically
  Object.values(grouped).forEach(arr => arr.sort((a,b) => a[1].dates[0].localeCompare(b[1].dates[0])));

  sel.innerHTML = '';
  Object.entries(groups).forEach(([badge, label]) => {
    const items = grouped[badge];
    if (!items.length) return;
    const og = document.createElement('optgroup');
    og.label = label;
    items.forEach(([key, t]) => {
      const opt = document.createElement('option');
      opt.value = key;
      const d0 = t.dates[0], d1 = t.dates[t.dates.length-1];
      // Format: "Jan 6–11" or "Mar 3–8"
      const fmt = d => new Date(d+'T12:00:00Z').toLocaleDateString('en-GB',{month:'short',day:'numeric'});
      const isLive = today >= d0 && today <= d1;
      const isPast = d1 < today;
      const hasData = t.tmtCode && t.tmtCode !== 'UNKNOWN';
      const liveTag = isLive ? ' 🔴' : '';
      opt.textContent = `${t.name.replace(' 2026','')} — ${fmt(d0)}–${fmt(d1).split(' ')[1]}${liveTag}`;
      if (!hasData && !isLive) opt.style.color = '#666';
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });

  sel.value = activeTmt;
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
// Fetches live data for any tournament via worker /fetch?tmtCode=X&date=Y (one request per day).
// Returns normalised: { matches: { "1": { key: matchObj }, ... } }

async function fetchData() {
  const tmt = TOURNAMENTS[activeTmt];
  if (tmt.tmtCode === 'UNKNOWN')
    throw new Error('This tournament isn\'t available yet — tmtCode not configured.');

  // Fetch once per day (no drawCode filter) — BWF returns all draws for that day
  // Much more reliable than per-draw fetching which can silently return nothing
  const allMatches = { '1':{}, '2':{}, '3':{}, '4':{}, '5':{} };
  const params = new URLSearchParams();
  if (tmt.tmtCode) params.set('tmtCode', tmt.tmtCode);
  if (tmt.tmtId)   params.set('tmtId',   tmt.tmtId);

  const tasks = tmt.dates.map(date => {
    const url = `${PROXY_URL}/fetch?${params}&date=${date}`;
    return fetch(url)
      .then(r => r.ok ? r.json() : null)
      .then(json => {
        if (!json || json.error) { if (json?.error) console.warn('BWF:', json.error); return; }
        const items = json.results || [];
        const list = Array.isArray(items) ? items : Object.values(items);
        list.forEach(m => {
          const dc = String(m.drawCode ?? '');
          if (!dc || !allMatches[dc]) return;
          // Use roundName+code as key — BWF reuses small code numbers across rounds
          // so plain code collides (e.g. MS Final code:"1" overwrites MS R32 code:"1")
          const key = `${m.roundName || 'X'}_${m.code || m.id || ''}`;
          if (key !== 'X_') allMatches[dc][key] = m;
        });
      })
      .catch(e => console.warn('Fetch failed for', date, e));
  });

  await Promise.all(tasks);
  // Debug: log match counts per draw
  const counts = Object.fromEntries(Object.entries(allMatches).map(([k,v])=>[k,Object.keys(v).length]));
  console.log('[BWF] Match counts by draw:', counts, '| Tournament:', activeTmt);
  return { matches: allMatches };
}

async function fetchAndRenderDraw() {

      <div class="ctext">This tournament doesn't have a numeric ID set up yet.</div>
    </div>`;
    return;
  }

  const bc = document.getElementById('bracket-content');
  const hasBracket = !!bc.querySelector('.bracket-scroll');

  if (!cachedData) {
    // First ever load — show spinner
    if (!hasBracket) {
      bc.innerHTML = `<div class="center"><div class="spinner"></div><div class="ctext">Loading draw...</div></div>`;
    }
    try {
      cachedData = await fetchData();
    } catch(e) {
      bc.innerHTML = `<div class="center">
        <div class="ctext" style="color:var(--red)">Could not load draw data</div>
        <div class="ctext">${e.message}</div>
      </div>`;
      return;
    }
  }

  if (hasBracket) {
    // Bracket already rendered — patch only the live scores, no re-render
    patchBracket(cachedData, activeDraw);
  } else {
    renderBracket(cachedData, activeDraw);
  }

  scheduleRefresh();
}

// Surgically update only the score/status parts of already-rendered cards.
// Finds each card by data-code and patches status badge, scores, and winner classes.
function patchBracket(data, drawCode) {
  const drawMatches = (data.matches || {})[drawCode] || {};
  Object.values(drawMatches).forEach(match => {
    const card = document.querySelector(`.mc[data-matchkey="${match.drawCode}_${match.code}"]`);
    if (!card) return;

    const isLive = match.matchStatus === 'P';
    const isDone = match.matchStatus === 'F' || match.matchStatus === 'C' || match.matchStatus === 'W';
    const w      = getWinner(match);

    // Update card-level live/done classes
    card.classList.toggle('mc-live', isLive);

    // Status badge
    const stEl = card.querySelector('[data-live-status]');
    if (stEl) {
      const statusLabel = isLive ? 'LIVE' : isDone ? 'FT' : (match.matchTime ? match.matchTime.slice(11,16) : '—');
      stEl.textContent = statusLabel;
      stEl.className   = `mc-st ${isLive ? 'st-live' : isDone ? 'st-ft' : 'st-next'}`;
    }

    // Team rows
    [1, 2].forEach(teamSlot => {
      const tr = card.querySelector(`[data-team="${teamSlot}"]`);
      if (!tr) return;
      const team   = teamSlot === 1 ? match.team1 : match.team2;
      const isW    = w === teamSlot;
      const french = isFrenchTeam(team);

      // Winner/french highlight on row
      tr.classList.toggle('tr-won',    isW && isDone);
      tr.classList.toggle('tr-french', french);

      // Name winner highlight
      const nameEl = tr.querySelector('[data-live-name]');
      if (nameEl) {
        nameEl.classList.toggle('n-won',    isW);
        nameEl.classList.toggle('n-french', !isW && french);
      }

      // Scores
      const scoresEl = tr.querySelector('[data-live-scores]');
      if (scoresEl) {
        const scores = match.score || [];
        scoresEl.innerHTML = scores.map((s, i) => {
          const v = teamSlot === 1 ? s.home : s.away;
          const o = teamSlot === 1 ? s.away : s.home;
          const isLast = isLive && i === scores.length - 1;
          const cls = 'sc' + (isLast ? ' sc-live' : v > o ? ' sc-w' : '');
          return `<span class="${cls}">${v}</span>`;
        }).join('');
      }
    });
  });
}

function scheduleRefresh() {
  clearInterval(autoTimer);

  if (!pageVisible) return; // tab hidden — don't poll

  const today = new Date().toISOString().slice(0,10);
  const tmt   = TOURNAMENTS[activeTmt];
  if (!tmt) return;

  const isTmtDay = today >= tmt.dates[0] && today <= tmt.dates[tmt.dates.length-1];
  if (!isTmtDay) return; // tournament not running today — no polling needed

  // Check all draws for any live match
  const allMatches = Object.values(cachedData?.matches || {}).flatMap(d => Object.values(d));
  const anyLive    = allMatches.some(m => m.matchStatus === 'P');

  // Fast poll (5s) when matches are live, slow poll (30s) on tournament days
  const interval = anyLive ? 5000 : 30000;

  autoTimer = setInterval(async () => {
    cachedData = null;
    await fetchAndRenderDraw();
  }, interval);
}

function renderScoreboard(data) {
  const allMatches = data.matches || {};
  const DISC_LABELS = {'1':"MS",'2':"WS",'3':"MD",'4':"WD",'5':"XD"};
  const DISC_FULL   = {'1':"Men's Singles",'2':"Women's Singles",'3':"Men's Doubles",'4':"Women's Doubles",'5':"Mixed Doubles"};
  const ROUND_ORDER_SB = ['F','Final','SF','QF','R16','R32','R64'];

  // Flatten all matches, attach drawCode
  let all = [];
  Object.entries(allMatches).forEach(([dc, matches]) => {
    Object.values(matches).forEach(m => {
      all.push({ ...m, drawCode: dc });
    });
  });

  if (!all.length) {
    document.getElementById('scores-content').innerHTML = `<div class="center"><div class="ctext">No matches found.</div></div>`;
    return;
  }

  // Group by status: live → upcoming → finished
  const live     = all.filter(m => m.matchStatus === 'P');
  const upcoming = all.filter(m => m.matchStatus === 'N' || m.matchStatus === 'S');
  const finished = all.filter(m => m.matchStatus === 'F' || m.matchStatus === 'C' || m.matchStatus === 'W');

  // Sort finished by round (latest first), then by matchTime desc
  finished.sort((a,b) => {
    const ra = ROUND_ORDER_SB.indexOf(a.roundName); const rb = ROUND_ORDER_SB.indexOf(b.roundName);
    if (ra !== rb) return ra - rb;
    return (b.matchTime||'').localeCompare(a.matchTime||'');
  });
  upcoming.sort((a,b) => (a.matchTime||'').localeCompare(b.matchTime||''));

  let html = '';

  function renderSBRow(m) {
    const isLive = m.matchStatus === 'P';
    const isDone = m.matchStatus === 'F' || m.matchStatus === 'C' || m.matchStatus === 'W';
    const w = getWinner(m);
    const hasFrench = isFrenchTeam(m.team1) || isFrenchTeam(m.team2);
    const disc = DISC_LABELS[m.drawCode] || '?';
    const rnd  = ROUND_NAMES[m.roundName] || m.roundName;
    const statusLabel = isLive ? 'LIVE' : isDone ? 'FT' : (m.matchTime ? m.matchTime.slice(11,16) : '—');
    const statusClass = isLive ? 'sst-live' : isDone ? 'sst-ft' : 'sst-next';
    const _tmt = TOURNAMENTS[activeTmt];
    const _matchDate = m.matchTime ? m.matchTime.slice(0,10) : '';
    const bwfUrl = (_tmt.tmtUrl || 'https://bwfworldtour.bwfbadminton.com') +
      (_matchDate ? '/' + _matchDate : '');

    function teamRow(team, num) {
      const isW = w === num;
      const flag = team?.countryFlagUrl || '';
      const name = shortName(team) || 'TBD';
      const seed = num === 1 ? m.team1seed : m.team2seed;
      const french = isFrenchTeam(team);
      const scores = m.score || [];
      let nc = 'sr-name';
      if (name === 'TBD') nc += '';
      else if (isW) nc += ' sn-won';
      else if (french) nc += ' sn-french';

      const scoreHtml = scores.map((s,i) => {
        const v = num===1 ? s.home : s.away;
        const o = num===1 ? s.away : s.home;
        const isLastSet = isLive && i === scores.length - 1;
        let cls = 'sr-set';
        if (isLastSet) cls += ' ss-live';
        else if (v > o) cls += ' ss-w';
        return `<span class="${cls}">${v}</span>`;
      }).join('');

      return `<div class="sr-team">
        ${flag ? `<img class="sr-flag" src="${flag}" alt="">` : `<div class="sr-flag"></div>`}
        <span class="sr-seed">${seed ? `[${seed}]` : ''}</span>
        <span class="${nc}">${name}</span>
        <div class="sr-scores" style="visibility:${num===2?'visible':'hidden'};position:${num===2?'static':'absolute'}">${scoreHtml}</div>
      </div>`;
    }

    // Build unified score column with both rows' scores side by side
    function scoreBlock(team, num) {
      const scores = m.score || [];
      return scores.map((s,i) => {
        const v = num===1 ? s.home : s.away;
        const o = num===1 ? s.away : s.home;
        const isLastSet = isLive && i === scores.length - 1;
        const isW = w === num;
        let cls = 'sr-set';
        if (isLastSet) cls += ' ss-live';
        else if (v > o) cls += ' ss-w';
        return `<span class="${cls}">${v}</span>`;
      }).join('');
    }

    const t1French = isFrenchTeam(m.team1);
    const t2French = isFrenchTeam(m.team2);
    const t1Won = w === 1 && isDone;
    const t2Won = w === 2 && isDone;
    const t1Name = shortName(m.team1) || 'TBD';
    const t2Name = shortName(m.team2) || 'TBD';
    const t1Seed = m.team1seed ? `[${m.team1seed}]` : '';
    const t2Seed = m.team2seed ? `[${m.team2seed}]` : '';
    const t1Flag = m.team1?.countryFlagUrl || '';
    const t2Flag = m.team2?.countryFlagUrl || '';

    return `<div class="score-row${isLive?' sr-live':''}${hasFrench?' sr-french':''}" onclick="window.open('${bwfUrl}','_blank')">
      <div class="sr-disc">${disc}</div>
      <div class="sr-rnd">${rnd}</div>
      <div class="sr-teams">
        <div class="sr-team">
          ${t1Flag?`<img class="sr-flag" src="${t1Flag}" alt="">`:`<div class="sr-flag"></div>`}
          <span class="sr-seed">${t1Seed}</span>
          <span class="sr-name${t1Won?' sn-won':''}${t1French?' sn-french':''}">${t1Name}</span>
        </div>
        <div class="sr-team">
          ${t2Flag?`<img class="sr-flag" src="${t2Flag}" alt="">`:`<div class="sr-flag"></div>`}
          <span class="sr-seed">${t2Seed}</span>
          <span class="sr-name${t2Won?' sn-won':''}${t2French?' sn-french':''}">${t2Name}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;padding:4px 8px;gap:0;flex-shrink:0;border-left:1px solid var(--border)">
        <div class="sr-team" style="border:none;padding:2px 0">${scoreBlock(m.team1,1)}</div>
        <div class="sr-team" style="border:none;padding:2px 0">${scoreBlock(m.team2,2)}</div>
      </div>
      <div class="sr-status ${statusClass}" style="display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--border);padding:4px 10px;align-self:stretch">
        ${statusLabel}${isLive&&m.time?`<br><span style="font-size:9px;color:#555">${m.time}</span>`:''}
      </div>
      <div class="sr-court${isLive?' ct-live':''}" style="display:flex;align-items:center">${m.courtName||''}</div>
    </div>`;
  }

  if (live.length) {
    html += `<div class="scores-section">
      <div class="scores-section-hdr">Live Now <span class="live-count">${live.length} LIVE</span></div>
      ${live.map(renderSBRow).join('')}
    </div>`;
  }

  if (upcoming.length) {
    html += `<div class="scores-section">
      <div class="scores-section-hdr">Upcoming</div>
      ${upcoming.map(renderSBRow).join('')}
    </div>`;
  }

  if (finished.length) {
    html += `<div class="scores-section">
      <div class="scores-section-hdr">Completed</div>
      ${finished.map(renderSBRow).join('')}
    </div>`;
  }

  document.getElementById('scores-content').innerHTML = html;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
// Get the winning team number (1 or 2) for a finished match.
// BWF sometimes stores winner=0 even when done, so fall back to counting sets.
function getWinner(m) {
  if (m.winner && m.winner !== 0) return m.winner;
  if (!m.score || !m.score.length) return 0;
  const done = m.matchStatus === 'F' || m.matchStatus === 'C' || m.matchStatus === 'W';
  if (!done) return 0;
  let t1 = 0, t2 = 0;
  m.score.forEach(s => {
    if (s.home > s.away) t1++;
    else if (s.away > s.home) t2++;
  });
  if (t1 > t2) return 1;
  if (t2 > t1) return 2;
  return 0;
}

// ─── FRENCH PLAYERS PANEL ────────────────────────────────────────────────────
function renderFrenchPanel(data) {
  const allMatches = data.matches || {};
  const frenchPlayers = {}; // key: playerId, value: { player, matches[], discipline }

  DRAW_LIST.forEach(disc => {
    const drawMatches = allMatches[disc.code] || {};
    const matches = Object.values(drawMatches);
    matches.forEach(match => {
      [match.team1, match.team2].forEach((team, ti) => {
        if (!team || !team.players) return;
        team.players.forEach(p => {
          if (p.countryCode === 'FRA') {
            if (!frenchPlayers[p.id]) {
              frenchPlayers[p.id] = { player: p, matches: [], discipline: disc.label, partnerIds: [] };
            }
            // Add partner if doubles
            const partner = team.players.find(pp => pp.id !== p.id);
            if (partner && !frenchPlayers[p.id].partnerIds.includes(partner.id)) {
              frenchPlayers[p.id].partnerIds.push(partner.id);
              frenchPlayers[p.id].partner = partner;
            }
            frenchPlayers[p.id].matches.push({ match, teamNum: ti + 1 });
          }
        });
      });
    });
  });

  const players = Object.values(frenchPlayers);

  if (!players.length) {
    document.getElementById('fp-sub').textContent = `No French players found in the draw.`;
    document.getElementById('fp-grid').innerHTML = `<div class="fp-empty">No French players in this tournament's draw.</div>`;
    return;
  }

  // Sort matches by round order for each player
  const roundOrder = ['R64','R32','R16','QF','SF','F','Final'];
  players.forEach(fp => {
    fp.matches.sort((a,b) => roundOrder.indexOf(a.match.roundName) - roundOrder.indexOf(b.match.roundName));
    // Determine current status
    const lastMatch = fp.matches[fp.matches.length - 1];
    const isLive = fp.matches.some(m => m.match.matchStatus === 'P');
    const eliminated = fp.matches.some(m => {
      const done = m.match.matchStatus === 'F' || m.match.matchStatus === 'C' || m.match.matchStatus === 'W';
      if (!done) return false;
      const w = getWinner(m.match);
      return w !== 0 && w !== m.teamNum;
    });
    fp.isLive = isLive;
    fp.isOut = eliminated && !isLive;
    fp.currentRound = lastMatch ? (ROUND_NAMES[lastMatch.match.roundName] || lastMatch.match.roundName) : '—';
  });

  // Sort: live first, then still in, then eliminated
  players.sort((a,b) => {
    if (a.isLive && !b.isLive) return -1;
    if (!a.isLive && b.isLive) return 1;
    if (!a.isOut && b.isOut) return -1;
    if (a.isOut && !b.isOut) return 1;
    return 0;
  });

  const inCount = players.filter(p => !p.isOut).length;
  document.getElementById('fp-sub').textContent = `${players.length} French player${players.length!==1?'s':''} in this tournament — ${inCount} still in the draw`;

  const html = players.map(fp => {
    const p = fp.player;
    const statusLabel = fp.isLive ? 'LIVE' : fp.isOut ? 'Eliminated' : `In — ${fp.currentRound}`;
    const statusClass = fp.isLive ? 'fps-live' : fp.isOut ? 'fps-out' : 'fps-in';

    const partnerStr = fp.partner ? ` / ${fp.partner.nameShort2||fp.partner.lastName}` : '';

    const matchRows = fp.matches.map(({ match, teamNum }) => {
      const isLive = match.matchStatus === 'P';
      const isDone = match.matchStatus === 'F' || match.matchStatus === 'C';
      const _w = getWinner(match);
      const isWinner = _w === teamNum;
      const isLoser = isDone && _w !== 0 && _w !== teamNum;

      const myTeam = teamNum === 1 ? match.team1 : match.team2;
      const oppTeam = teamNum === 1 ? match.team2 : match.team1;
      const oppName = oppTeam.players.length
        ? oppTeam.players.map(p => p.nameShort2||p.lastName).join(' / ')
        : 'TBD';
      const oppFlag = oppTeam.countryFlagUrl || '';

      const scoreStr = match.score.map(s => {
        const my = teamNum === 1 ? s.home : s.away;
        const opp = teamNum === 1 ? s.away : s.home;
        return `${my}-${opp}`;
      }).join(' ');

      const resultClass = isLive ? 'res-live' : isWinner ? 'res-w' : isLoser ? 'res-l' : '';
      const resultChar = isLive ? '●' : isWinner ? 'W' : isLoser ? 'L' : '—';
      const scoreClass = isLive ? 'score-live' : isWinner ? 'score-w' : isLoser ? 'score-l' : '';
      const rnd = ROUND_NAMES[match.roundName] || match.roundName;

      return `<div class="fp-match">
        <div class="fp-match-rnd">${rnd}</div>
        <div class="fp-match-players">
          <div class="fp-match-vs">
            vs <span class="opp">${oppFlag ? `<img src="${oppFlag}" style="width:12px;height:12px;border-radius:50%;vertical-align:middle;object-fit:cover"> ` : ''}${oppName}</span>
          </div>
        </div>
        <div class="fp-match-score ${scoreClass}">${scoreStr || (isLive ? 'Live' : '—')}</div>
        <div class="fp-match-result ${resultClass}">${resultChar}</div>
      </div>`;
    }).join('');

    return `<div class="fp-player">
      <div class="fp-player-head">
        <img class="fp-avatar" src="${p.avatar?.thumbnailUrl||''}" alt="" onerror="this.style.display='none'">
        <div class="fp-player-info">
          <div class="fp-player-name">${p.nameDisplay}${partnerStr}</div>
          <div class="fp-player-disc">${fp.discipline}</div>
        </div>
        <span class="fp-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="fp-matches">${matchRows || '<div class="fp-empty" style="padding:12px 14px;font-size:11px">No matches yet</div>'}</div>
    </div>`;
  }).join('');

  document.getElementById('fp-grid').innerHTML = html;
}

// ─── BRACKET RENDERER ────────────────────────────────────────────────────────
function isFrenchTeam(team) {
  return team?.players?.some(p => p.countryCode === 'FRA');
}

function shortName(team) {
  if (!team?.players?.length) return '';
  return team.players.map(p => p.nameShort2||p.lastName||p.nameDisplay).join(' / ');
}

const ROUND_ORDER_LIST = ['R64','R32','R16','QF','SF','F','Final'];
function getGap(roundName) {
  const col = ROUND_ORDER_LIST.indexOf(roundName);
  const c = col < 0 ? 0 : col;
  if (c === 0) return GAP_BASE;
  return Math.pow(2, c) * (CARD_H + GAP_BASE) - CARD_H;
}
function getTopPad(roundName) {
  const col = ROUND_ORDER_LIST.indexOf(roundName);
  const c = col < 0 ? 0 : col;
  if (c === 0) return 0;
  const prev = ROUND_ORDER_LIST[c - 1];
  return (getGap(roundName) - getGap(prev)) / 2;
}

function renderBracket(data, drawCode) {
  const drawMatches = (data.matches || {})[drawCode] || {};
  const matchList = Object.values(drawMatches);

  if (!matchList.length) {
    const tmt = TOURNAMENTS[activeTmt];
    const isUnknown = tmt.tmtCode === 'UNKNOWN';
    document.getElementById('bracket-content').innerHTML = `<div class="center">
      <div class="ctext" style="color:var(--red)">${isUnknown ? 'Could Not Load Draw' : 'No Draw Data'}</div>
      <div class="ctext">${isUnknown
        ? 'The worker could not resolve this tournament\'s UUID automatically. Open the BWF results page in DevTools → Network → find the day-matches request → copy the tournamentCode UUID → add it as <code>tmtCode</code> in the TOURNAMENTS registry.'
        : 'No draw data yet for this discipline.'
      }</div>
    </div>`;
    return;
  }

  // Group by round, sort by numeric code (= bracket position)
  const ROUND_ORDER = ['R64','R32','R16','QF','SF','F','Final'];
  const roundCols = {};
  matchList.forEach(match => {
    const rn = match.roundName || 'F';
    if (!roundCols[rn]) roundCols[rn] = [];
    roundCols[rn].push(match);
  });
  Object.keys(roundCols).forEach(rn => {
    roundCols[rn].sort((a, b) => parseInt(a.code) - parseInt(b.code));
  });
  const cols = Object.keys(roundCols).sort((a,b) => ROUND_ORDER.indexOf(a) - ROUND_ORDER.indexOf(b));

  function colGap(ci) {
    if (ci === 0) return GAP_BASE;
    return Math.pow(2, ci) * (CARD_H + GAP_BASE) - CARD_H;
  }
  function colTopPad(ci) {
    if (ci === 0) return 0;
    return (colGap(ci) - colGap(ci - 1)) / 2;
  }

  const CONN_W = 24;
  const JOIN_W = 18;
  let html = `<div class="bracket-scroll"><div class="bracket" id="bracket-inner" style="padding-top:4px">`;

  cols.forEach((col, ci) => {
    const matches = roundCols[col];
    const isLast  = ci === cols.length - 1;
    const gap     = colGap(ci);
    const topPad  = colTopPad(ci);
    const hasLive = matches.some(m => m?.matchStatus === 'P');
    const rLabel  = ROUND_NAMES_LONG[col] || col;
    const colW    = CARD_W + (isLast ? 0 : CONN_W);

    html += `<div class="round-col" data-ci="${ci}" style="width:${colW}px">`;
    html += `<div class="round-hdr${hasLive?' r-live':''}">${rLabel}</div>`;
    html += `<div class="round-body" data-ci="${ci}" style="padding-top:${topPad}px">`;

    matches.forEach((match, row) => {
      if (row > 0) html += `<div style="height:${gap}px;flex-shrink:0"></div>`;
      html += `<div class="card-row" data-ci="${ci}" data-row="${row}" style="display:flex;align-items:center">`;
      html += renderCard(match, isLast);
      if (!isLast) html += `<div style="width:${CONN_W}px;height:1px;background:var(--border);flex-shrink:0"></div>`;
      html += `</div>`;
    });

    html += `</div></div>`;

    // Placeholder SVG — will be replaced with exact measurements after DOM render
    if (!isLast) {
      html += `<svg class="vjoins" id="join-${ci}" width="${JOIN_W}" height="1000" style="flex-shrink:0;overflow:visible"></svg>`;
    }
  });

  html += `</div></div>`;
  document.getElementById('bracket-content').innerHTML = html;

  // After DOM is fully painted: measure real card positions,
  // reposition each column's round-body to align correctly,
  // then draw exact connector lines.
  // Double-RAF ensures full layout pass has completed before measuring.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const bracket = document.getElementById('bracket-inner');
    if (!bracket) return;
    const bracketTop = bracket.getBoundingClientRect().top;

    // Measure current card row midpoints per column
    function measureMids() {
      const mids = {};
      bracket.querySelectorAll('.card-row').forEach(row => {
        const ci  = parseInt(row.dataset.ci);
        const idx = parseInt(row.dataset.row);
        if (!mids[ci]) mids[ci] = [];
        const rect = row.getBoundingClientRect();
        mids[ci][idx] = rect.top + rect.height / 2 - bracketTop;
      });
      return mids;
    }

    // Pass 1: fix topPad for each column so card[0] sits at the correct y
    // For ci>0, card[0] should be at the midpoint of from-col cards [0] and [1]
    for (let ci = 1; ci < cols.length; ci++) {
      const body = bracket.querySelector(`.round-body[data-ci="${ci}"]`) ||
                   bracket.querySelectorAll('.round-body')[ci];
      if (!body) continue;

      const mids = measureMids();
      const fromMids = mids[ci - 1] || [];
      if (fromMids.length < 2) continue;

      const pairSize   = fromMids.length / (mids[ci] || [1]).length;
      const targetY    = (fromMids[0] + fromMids[Math.round(pairSize) - 1]) / 2;
      const currentY   = (mids[ci] || [])[0];
      if (currentY === undefined) continue;

      const currentPad = parseFloat(body.style.paddingTop) || 0;
      const newPad     = Math.max(0, currentPad + (targetY - currentY));
      body.style.paddingTop = newPad + 'px';
    }

    // Pass 2: re-measure after padding adjustments, draw connectors
    const cardMids = measureMids();

    cols.forEach((col, ci) => {
      if (ci === cols.length - 1) return;
      const svg = document.getElementById(`join-${ci}`);
      if (!svg) return;

      const fromMids = cardMids[ci]     || [];
      const toMids   = cardMids[ci + 1] || [];
      if (!fromMids.length || !toMids.length) return;
      const pairSize = fromMids.length / toMids.length;

      let paths = '';
      toMids.forEach((yt, ti) => {
        const f1 = Math.round(ti * pairSize);
        const f2 = Math.round(ti * pairSize + pairSize - 1);
        const y1 = fromMids[f1];
        const y2 = fromMids[f2];
        if (y1 === undefined || y2 === undefined) return;
        const yMid = (y1 + y2) / 2;
        paths += `<line x1="0" y1="${y1.toFixed(1)}" x2="0" y2="${y2.toFixed(1)}" stroke="#2e2e2e" stroke-width="1"/>`;
        paths += `<line x1="0" y1="${yMid.toFixed(1)}" x2="${JOIN_W}" y2="${yMid.toFixed(1)}" stroke="#2e2e2e" stroke-width="1"/>`;
      });

      const allMids = [...fromMids, ...toMids].filter(Number.isFinite);
      svg.setAttribute('height', Math.max(...allMids) + 40 - bracketTop);
      svg.setAttribute('style', 'flex-shrink:0;overflow:visible');
      svg.innerHTML = paths;
    });
  }));
}

function renderCard(match, isFinal) {
  const isEmpty = !match || (!match.team1?.players?.length && !match.team2?.players?.length && match.matchStatus==='N');
  if (isEmpty) {
    return `<div class="mc mc-empty" style="height:${CARD_H}px">
      <div class="mc-head"><span class="mc-rnd">${ROUND_NAMES[match?.roundName]||'—'}</span></div>
      <div class="tr"><span class="tr-name n-tbd">TBD</span></div>
      <div class="tr"><span class="tr-name n-tbd">TBD</span></div>
    </div>`;
  }

  const isLive = match.matchStatus==='P';
  const isDone = match.matchStatus==='F'||match.matchStatus==='C'||match.matchStatus==='W';
  const w = getWinner(match);
  const hasFrench = isFrenchTeam(match.team1)||isFrenchTeam(match.team2);
  const _t = TOURNAMENTS[activeTmt];
  const _md = match.matchTime ? match.matchTime.slice(0,10) : '';
  const bwfUrl = (_t.tmtUrl || 'https://bwfworldtour.bwfbadminton.com') + (_md ? '/' + _md : '');
  const statusLabel = isLive ? 'LIVE' : isDone ? 'FT' : (match.matchTime ? match.matchTime.slice(11,16) : '—');
  const statusClass = isLive ? 'st-live' : isDone ? 'st-ft' : 'st-next';

  return `<div class="mc${isLive?' mc-live':''}${isFinal?' mc-final':''}${hasFrench?' mc-french':''}" data-matchkey="${match.drawCode}_${match.code}" style="height:${CARD_H}px" onclick="window.open('${bwfUrl}','_blank')">
    <div class="mc-head">
      <span class="mc-rnd">${ROUND_NAMES[match.roundName]||match.roundName}</span>
      <span class="mc-st ${statusClass}" data-live-status>${statusLabel}</span>
    </div>
    ${renderTeamRow(match.team1, 1, w, match, isLive, isDone, 1)}
    ${renderTeamRow(match.team2, 2, w, match, isLive, isDone, 2)}
  </div>`;
}

function renderTeamRow(team, num, winner, match, isLive, isDone, teamSlot) {
  const isW = winner===num;
  const seed = num===1 ? match.team1seed : match.team2seed;
  const flag = team?.countryFlagUrl;
  const name = shortName(team) || 'TBD';
  const french = isFrenchTeam(team);
  const scores = match.score||[];
  let nc = 'tr-name';
  if (name==='TBD') nc += ' n-tbd';
  else if (isW) nc += ' n-won';
  else if (french) nc += ' n-french';
  else if (isLive||isDone) nc += '';
  else nc += ' n-on';

  const scoreHtml = scores.map((s,i) => {
    const v = num===1 ? s.home : s.away;
    const o = num===1 ? s.away : s.home;
    const isLast = isLive && i===scores.length-1;
    let cls = 'sc';
    if (isLast) cls += ' sc-live';
    else if (v>o) cls += ' sc-w';
    return `<span class="${cls}">${v}</span>`;
  }).join('');

  return `<div class="tr${isW&&isDone?' tr-won':''}${french?' tr-french':''}" data-team="${teamSlot||num}">
    ${flag?`<img class="tr-flag" src="${flag}" alt="">`:`<div class="tr-flag"></div>`}
    <span class="tr-seed">${seed?`[${seed}]`:''}</span>
    <span class="${nc}" data-live-name>${name}</span>
    <div class="tr-scores" data-live-scores>${scoreHtml}</div>
  </div>`;
}
</script>
